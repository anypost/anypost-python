name: Release

# Publishes to PyPI on a version tag (e.g. v0.1.0). Bump the version in
# src/anypost/_version.py (the single source), tag the commit, and push.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token. Configure the project's
# trusted publisher on PyPI to allow this repository + workflow, and create a
# GitHub Environment named `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
